name: Windows Portable Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'
      - 'phase*'
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-portable:
    name: Build portable Windows artifact
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DOTNET_NOLOGO: 'true'
      DOTNET_CLI_TELEMETRY_OPTOUT: 'true'
      BUILD_CONFIGURATION: Release
      RUNTIME_IDENTIFIER: win-x64
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Set up .NET 10 SDK
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: 10.0.x

      - name: Resolve package version
        shell: bash
        run: |
          version="$(dotnet msbuild ./src/MailWhere.Windows/MailWhere.Windows.csproj -nologo -getProperty:Version | tr -d '\r' | xargs)"
          echo "PACKAGE_VERSION=v$version" >> "$GITHUB_ENV"

      - name: Cache NuGet packages
        uses: actions/cache@v5.0.5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Verify and publish portable zip
        shell: bash
        run: ./scripts/publish-portable.sh

      - name: Upload portable zip
        uses: actions/upload-artifact@v7.0.1
        with:
          name: MailWhere-${{ env.PACKAGE_VERSION }}-${{ env.RUNTIME_IDENTIFIER }}-portable
          path: artifacts/MailWhere-${{ env.PACKAGE_VERSION }}-${{ env.RUNTIME_IDENTIFIER }}-portable.zip
          if-no-files-found: error
          retention-days: 14
